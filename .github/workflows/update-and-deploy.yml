name: Update AstrBot Personal Plugin Source

on:
  push:
    branches:
      - main
    paths:
      - "watchlist.json"
      - "scripts/build_plugins_json.py"
      - ".github/workflows/update.yml"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Build plugins.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/build_plugins_json.py

      - name: Commit plugins.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet plugins.json; then
            echo "plugins.json unchanged."
            exit 0
          fi

          git add plugins.json
          git commit -m "chore: update plugins.json"
          git push
